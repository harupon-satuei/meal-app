<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>食事バランス計算アプリ</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #222;
      --sub: #666;
      --line: #e9e9ee;
      --accent: #222;
      --danger: #c62828;
      --soft: #eef4ff;
      --shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
      --radius: 18px;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-text-size-adjust: 100%;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px 14px 110px;
    }

    h1 {
      font-size: 26px;
      line-height: 1.3;
      margin: 0 0 8px;
    }

    h2 {
      font-size: 19px;
      margin: 0 0 14px;
    }

    .sub {
      margin: 0 0 18px;
      color: var(--sub);
      font-size: 14px;
      line-height: 1.7;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #444;
    }

    input,
    select,
    button {
      width: 100%;
      min-height: 48px;
      border-radius: 12px;
      font-size: 16px;
    }

    input,
    select {
      border: 1px solid #d7d7de;
      background: #fff;
      color: #222;
      padding: 12px 14px;
      appearance: none;
    }

    button {
      border: none;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      padding: 12px 16px;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.99);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 6px;
    }

    .summary-box {
      background: #fafafa;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 10px;
      text-align: center;
    }

    .summary-box h3 {
      margin: 0 0 8px;
      font-size: 12px;
      color: #555;
      font-weight: 500;
    }

    .summary-box p {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
    }

    .comment {
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      background: var(--soft);
      color: #234;
      line-height: 1.7;
      font-size: 14px;
    }

    .meal-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .meal-item {
      background: #fafafa;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }

    .meal-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .meal-type {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 52px;
      padding: 5px 10px;
      border-radius: 999px;
      background: #222;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
    }

    .meal-name {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.5;
      margin: 0 0 8px;
    }

    .meal-detail {
      font-size: 13px;
      color: #555;
      line-height: 1.9;
    }

    .delete-btn {
      width: auto;
      min-height: 40px;
      padding: 8px 12px;
      border-radius: 10px;
      background: var(--danger);
      font-size: 14px;
      font-weight: 700;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .empty-text {
      color: var(--sub);
      font-size: 14px;
      margin: 6px 2px 0;
    }

    .footer-space {
      height: 12px;
    }

    @media (min-width: 768px) {
      .container {
        padding: 24px 20px 110px;
      }

      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .summary {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>食事バランス計算アプリ</h1>
    <p class="sub">食品を検索して数量を入れると、カロリーとPFCを自動で計算します。</p>

    <div class="card">
      <h2>食事を追加</h2>
      <div class="grid">
        <div>
          <label for="foodSearch">食品検索</label>
          <input id="foodSearch" type="text" placeholder="例：ご飯、卵、バナナ" />
        </div>

        <div>
          <label for="foodSelect">食品</label>
          <select id="foodSelect"></select>
        </div>

        <div>
          <label for="quantityInput">数量</label>
          <input id="quantityInput" type="number" min="0.1" step="0.1" value="1" />
        </div>

        <div>
          <label for="mealType">食事区分</label>
          <select id="mealType">
            <option value="朝">朝</option>
            <option value="昼">昼</option>
            <option value="夜">夜</option>
            <option value="間食">間食</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button id="addBtn">追加する</button>
      </div>
    </div>

    <div class="card">
      <h2>合計</h2>
      <div class="summary">
        <div class="summary-box">
          <h3>カロリー</h3>
          <p id="totalCalories">0</p>
        </div>
        <div class="summary-box">
          <h3>たんぱく質(P)</h3>
          <p id="totalProtein">0</p>
        </div>
        <div class="summary-box">
          <h3>脂質(F)</h3>
          <p id="totalFat">0</p>
        </div>
        <div class="summary-box">
          <h3>炭水化物(C)</h3>
          <p id="totalCarbs">0</p>
        </div>
      </div>

      <div class="comment" id="commentBox">
        まだ食事が登録されていません。
      </div>
    </div>

    <div class="card">
      <h2>登録した食事</h2>
      <div id="mealList" class="meal-list"></div>
      <p id="emptyText" class="empty-text">まだ登録がありません。</p>

      <div class="actions">
        <button id="clearBtn">すべて削除</button>
      </div>
    </div>

    <div class="footer-space"></div>
  </div>

  <script>
    const foodData = [
      // 主食
      { name: "ご飯 100g", calories: 168, protein: 2.5, fat: 0.3, carbs: 37.1 },
      { name: "おにぎり 1個", calories: 180, protein: 3.5, fat: 0.5, carbs: 40.0 },
      { name: "食パン 1枚", calories: 149, protein: 5.0, fat: 2.6, carbs: 28.0 },
      { name: "ロールパン 1個", calories: 95, protein: 2.8, fat: 2.0, carbs: 16.5 },
      { name: "うどん 1玉", calories: 210, protein: 5.7, fat: 0.8, carbs: 43.0 },
      { name: "そば 1玉", calories: 270, protein: 12.0, fat: 2.0, carbs: 48.0 },
      { name: "パスタ 100g(乾麺)", calories: 379, protein: 13.0, fat: 2.2, carbs: 75.8 },
      { name: "オートミール 30g", calories: 114, protein: 4.1, fat: 2.1, carbs: 20.7 },
      { name: "玄米 100g", calories: 152, protein: 2.8, fat: 1.0, carbs: 35.6 },
      { name: "もち 1個", calories: 118, protein: 2.0, fat: 0.3, carbs: 26.0 },
      { name: "コーンフレーク 40g", calories: 152, protein: 2.4, fat: 0.4, carbs: 34.8 },

      // 卵・大豆・乳製品
      { name: "卵 1個", calories: 76, protein: 6.2, fat: 5.2, carbs: 0.2 },
      { name: "納豆 1パック", calories: 90, protein: 7.4, fat: 4.5, carbs: 5.4 },
      { name: "豆腐 150g", calories: 84, protein: 7.4, fat: 4.5, carbs: 2.0 },
      { name: "豆乳 200ml", calories: 92, protein: 7.2, fat: 5.6, carbs: 3.8 },
      { name: "牛乳 200ml", calories: 134, protein: 6.6, fat: 7.6, carbs: 9.6 },
      { name: "ヨーグルト 1個", calories: 62, protein: 3.6, fat: 3.0, carbs: 6.0 },
      { name: "ギリシャヨーグルト 1個", calories: 100, protein: 10.0, fat: 0.2, carbs: 5.0 },
      { name: "チーズ 1枚", calories: 60, protein: 3.6, fat: 4.8, carbs: 0.3 },

      // 肉・魚
      { name: "鶏むね肉 100g", calories: 133, protein: 24.0, fat: 1.9, carbs: 0.0 },
      { name: "鶏もも肉 100g", calories: 190, protein: 16.6, fat: 14.2, carbs: 0.0 },
      { name: "ささみ 100g", calories: 98, protein: 23.0, fat: 0.8, carbs: 0.0 },
      { name: "豚ロース 100g", calories: 263, protein: 19.3, fat: 19.2, carbs: 0.2 },
      { name: "牛もも肉 100g", calories: 182, protein: 20.5, fat: 10.7, carbs: 0.5 },
      { name: "サラダチキン 1個", calories: 115, protein: 24.0, fat: 1.2, carbs: 1.0 },
      { name: "ハム 2枚", calories: 40, protein: 3.2, fat: 2.9, carbs: 0.5 },
      { name: "ソーセージ 2本", calories: 120, protein: 5.0, fat: 10.5, carbs: 2.0 },
      { name: "鮭 1切れ", calories: 124, protein: 22.3, fat: 4.1, carbs: 0.1 },
      { name: "さば 1切れ", calories: 202, protein: 20.6, fat: 12.1, carbs: 0.3 },
      { name: "ツナ缶 1缶", calories: 70, protein: 15.0, fat: 0.7, carbs: 0.1 },
      { name: "サバ缶 1缶", calories: 190, protein: 20.9, fat: 11.7, carbs: 0.2 },

      // 野菜・きのこ・海藻
      { name: "ブロッコリー 100g", calories: 33, protein: 4.3, fat: 0.5, carbs: 5.2 },
      { name: "キャベツ 100g", calories: 23, protein: 1.3, fat: 0.2, carbs: 5.2 },
      { name: "レタス 100g", calories: 12, protein: 0.6, fat: 0.1, carbs: 2.8 },
      { name: "トマト 1個", calories: 19, protein: 0.7, fat: 0.1, carbs: 4.7 },
      { name: "きゅうり 1本", calories: 14, protein: 0.7, fat: 0.1, carbs: 3.0 },
      { name: "にんじん 100g", calories: 35, protein: 0.7, fat: 0.2, carbs: 8.8 },
      { name: "玉ねぎ 100g", calories: 37, protein: 1.0, fat: 0.1, carbs: 8.8 },
      { name: "ほうれん草 100g", calories: 20, protein: 2.2, fat: 0.4, carbs: 3.1 },
      { name: "もやし 100g", calories: 15, protein: 1.7, fat: 0.1, carbs: 2.6 },
      { name: "きのこミックス 100g", calories: 18, protein: 2.7, fat: 0.3, carbs: 3.5 },
      { name: "わかめ 1杯分", calories: 5, protein: 0.4, fat: 0.1, carbs: 1.0 },
      { name: "サラダ 1皿", calories: 25, protein: 1.5, fat: 0.3, carbs: 5.0 },

      // 果物
      { name: "バナナ 1本", calories: 86, protein: 1.1, fat: 0.2, carbs: 22.5 },
      { name: "りんご 1個", calories: 140, protein: 0.4, fat: 0.2, carbs: 37.0 },
      { name: "みかん 1個", calories: 34, protein: 0.6, fat: 0.1, carbs: 8.9 },
      { name: "キウイ 1個", calories: 51, protein: 1.0, fat: 0.1, carbs: 13.4 },

      // 飲み物・補助
      { name: "プロテイン 1杯", calories: 120, protein: 20.0, fat: 2.0, carbs: 4.0 },
      { name: "ブラックコーヒー 1杯", calories: 4, protein: 0.2, fat: 0.0, carbs: 0.7 },
      { name: "カフェラテ 1杯", calories: 95, protein: 4.5, fat: 3.8, carbs: 10.2 },
      { name: "オレンジジュース 200ml", calories: 84, protein: 1.4, fat: 0.2, carbs: 20.8 },

      // 汁物・簡単メニュー
      { name: "味噌汁 1杯", calories: 35, protein: 2.5, fat: 1.0, carbs: 3.5 },
      { name: "野菜スープ 1杯", calories: 40, protein: 1.5, fat: 1.0, carbs: 6.0 },
      { name: "カレーライス 1皿", calories: 700, protein: 20.0, fat: 20.0, carbs: 95.0 },
      { name: "牛丼 1杯", calories: 633, protein: 20.2, fat: 23.5, carbs: 85.0 },
      { name: "親子丼 1杯", calories: 620, protein: 25.0, fat: 18.0, carbs: 82.0 },
      { name: "ラーメン 1杯", calories: 450, protein: 16.0, fat: 14.0, carbs: 65.0 },
      { name: "チャーハン 1皿", calories: 670, protein: 15.0, fat: 22.0, carbs: 95.0 },

      // 間食
      { name: "ミックスナッツ 30g", calories: 180, protein: 5.0, fat: 15.0, carbs: 6.0 },
      { name: "チョコレート 1枚", calories: 279, protein: 3.8, fat: 17.2, carbs: 27.0 },
      { name: "ポテトチップス 1袋", calories: 336, protein: 4.1, fat: 21.6, carbs: 32.6 },
      { name: "クッキー 3枚", calories: 150, protein: 2.0, fat: 7.0, carbs: 20.0 },
      { name: "アイスクリーム 1個", calories: 180, protein: 3.0, fat: 8.0, carbs: 24.0 }
    ];

    const foodSelect = document.getElementById("foodSelect");
    const foodSearch = document.getElementById("foodSearch");
    const quantityInput = document.getElementById("quantityInput");
    const mealType = document.getElementById("mealType");
    const addBtn = document.getElementById("addBtn");
    const clearBtn = document.getElementById("clearBtn");
    const mealList = document.getElementById("mealList");
    const emptyText = document.getElementById("emptyText");

    const totalCalories = document.getElementById("totalCalories");
    const totalProtein = document.getElementById("totalProtein");
    const totalFat = document.getElementById("totalFat");
    const totalCarbs = document.getElementById("totalCarbs");
    const commentBox = document.getElementById("commentBox");

    let meals = [];
    let filteredFoods = [...foodData];

    foodData.sort((a, b) => a.name.localeCompare(b.name, "ja"));

    function roundToOne(num) {
      return Math.round(num * 10) / 10;
    }

    function renderFoodOptions() {
      foodSelect.innerHTML = "";

      if (filteredFoods.length === 0) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "該当する食品がありません";
        foodSelect.appendChild(option);
        return;
      }

      filteredFoods.forEach((food, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.textContent = food.name;
        foodSelect.appendChild(option);
      });
    }

    function filterFoods() {
      const keyword = foodSearch.value.trim().toLowerCase();
      filteredFoods = foodData.filter(food =>
        food.name.toLowerCase().includes(keyword)
      );
      renderFoodOptions();
    }

    function renderMealList() {
      mealList.innerHTML = "";

      if (meals.length === 0) {
        emptyText.style.display = "block";
        return;
      }

      emptyText.style.display = "none";

      meals.forEach((meal, index) => {
        const item = document.createElement("div");
        item.className = "meal-item";

        item.innerHTML = `
          <div class="meal-top">
            <span class="meal-type">${meal.mealType}</span>
            <button class="delete-btn" onclick="deleteMeal(${index})">削除</button>
          </div>
          <div class="meal-name">${meal.name}</div>
          <div class="meal-detail">
            数量: ${meal.quantity}<br>
            カロリー: ${meal.calories} kcal<br>
            P: ${meal.protein}g / F: ${meal.fat}g / C: ${meal.carbs}g
          </div>
        `;

        mealList.appendChild(item);
      });
    }

    function renderSummary() {
      const calories = roundToOne(meals.reduce((sum, item) => sum + item.calories, 0));
      const protein = roundToOne(meals.reduce((sum, item) => sum + item.protein, 0));
      const fat = roundToOne(meals.reduce((sum, item) => sum + item.fat, 0));
      const carbs = roundToOne(meals.reduce((sum, item) => sum + item.carbs, 0));

      totalCalories.textContent = calories;
      totalProtein.textContent = protein;
      totalFat.textContent = fat;
      totalCarbs.textContent = carbs;

      commentBox.textContent = getComment(protein, fat, carbs, meals.length);
    }

    function getComment(protein, fat, carbs, count) {
      if (count === 0) {
        return "まだ食事が登録されていません。";
      }

      const comments = [];

      if (protein < 20) {
        comments.push("たんぱく質が少なめです。");
      } else if (protein >= 60) {
        comments.push("たんぱく質はしっかり取れています。");
      } else {
        comments.push("たんぱく質はまずまずです。");
      }

      if (fat > 50) {
        comments.push("脂質がやや多めです。");
      } else {
        comments.push("脂質は極端には多くありません。");
      }

      if (carbs > 250) {
        comments.push("炭水化物が多めです。");
      } else if (carbs < 100) {
        comments.push("炭水化物は少なめです。");
      } else {
        comments.push("炭水化物はバランス範囲です。");
      }

      return comments.join(" ");
    }

    function addMeal() {
      const foodIndex = Number(foodSelect.value);
      const quantity = Number(quantityInput.value);

      if (!filteredFoods[foodIndex]) {
        alert("食品を選択してください。");
        return;
      }

      if (!quantity || quantity <= 0) {
        alert("数量を正しく入力してください。");
        return;
      }

      const food = filteredFoods[foodIndex];

      const meal = {
        mealType: mealType.value,
        name: food.name,
        quantity: quantity,
        calories: roundToOne(food.calories * quantity),
        protein: roundToOne(food.protein * quantity),
        fat: roundToOne(food.fat * quantity),
        carbs: roundToOne(food.carbs * quantity)
      };

      meals.push(meal);
      renderMealList();
      renderSummary();
    }

    function deleteMeal(index) {
      meals.splice(index, 1);
      renderMealList();
      renderSummary();
    }

    function clearMeals() {
      meals = [];
      renderMealList();
      renderSummary();
    }

    foodSearch.addEventListener("input", filterFoods);
    addBtn.addEventListener("click", addMeal);
    clearBtn.addEventListener("click", clearMeals);

    renderFoodOptions();
    renderMealList();
    renderSummary();

    window.deleteMeal = deleteMeal;
  </script>
</body>
</html>
